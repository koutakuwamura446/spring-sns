<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>トップ画面</title>
	<link rel="stylesheet" href="/css/top.css">
	<link rel="stylesheet" href="/css/side.css">
</head>

<body>
	<header th:replace="header"></header>
	<div class="post-container">
		<!--左寄せ-->
		<div class="left-container">
			<form action="/top" method="post" class="new-post-form">
				<!-- 1行目：アイコンと入力欄 -->
				<div class="post-top">
					<img th:src="@{/images/icon-images/{icon}(icon=${user.iconPath})}" class="new-post-icon"
						alt="プロフィール画像">
					<input class="post-input" placeholder="投稿内容を入力してください">
				</div>

				<!-- 2行目：投稿ボタン -->
				<div class="post-bottom">
					<span th:text="${postTextMessage}" class="error-message"></span><br />
					<button type="submit" class="post-button">
						<img src="/images/css-images/post.png" >
					</button>
					
				</div>
			</form>
			<div>
				<hr class="post-hr">
			</div>



			<div class="history-post">
				<div th:each="post : ${postList}" class="post-block">
					<!-- 左：アイコン -->
					<img th:src="@{/images/icon-images/{icon}(icon=${post.user.iconPath})}" class="history-post-icon"
						alt="プロフィール画像">
					<!-- 右：投稿内容 -->
					<div class="history-post-content">
						<!-- ユーザー名＋日時 -->
						<div class="history-user-createdAt">
							<p th:text="${post.user.username}" class="history-post-username">ユーザー名</p>
							<p th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"
								class="history-post-createdAt">作成日</p>
						</div>

						<!-- 投稿本文 -->
						<div class="history-posts">
							<p th:text="${post.post}">投稿内容</p>
						</div>



						<!-- 編集・削除ボタンをログインユーザーの投稿にのみ表示 -->
						<div th:if="${post.user.id} == ${user.id}" class="edit-delete">

							<!-- 編集ボタン -->
							<img src="/images/css-images/edit.png" alt="編集ボタン"
							     class="edit-btn"
							     th:onclick="'openEditModal(' + ${post.id} + ')'">

								<!-- 編集モーダル -->
								<div th:id="'editModal-' + ${post.id}" class="modal">
									<div class="modal-edit-box">

										<form th:action="@{/posts/edit/{id}(id=${post.id})}" method="post" style="display:inline;">
											<textarea name="post" class="modal-edit-textarea"
											          th:text="${post.post}"></textarea>
											<button type="submit" class="modal-edit-button">
												<img src="/images/css-images/edit.png" alt="編集ボタン"
												     th:onclick="'closeEditModal(' + ${post.id} + ')'"
												     class="modal-edit-img">
											</button>
										</form>

									</div>
								</div>

							<!-- 削除ボタン -->
							<div class="trash-btn" th:onclick="'openDeleteModal(' + ${post.id} + ')'"></div>


							<!-- 削除モーダル -->
							<div th:id="'deleteModal-' + ${post.id}" class="modal">
							  <div class="modal-delete-box">
							    <p class="modal-delete-message">この投稿を削除します。よろしいでしょうか？</p>
							    <div class="modal-delete-buttons">
							      <form th:action="@{/posts/delete/{id}(id=${post.id})}" method="post" style="display:inline;">
							        <button type="submit" class="modal-btn ok-btn">OK</button>
							      </form>
							      <button type="button" class="modal-btn cancel-btn"
							              th:onclick="'closeDeleteModal(' + ${post.id} + ')'">キャンセル</button>
							    </div>
							  </div>
							</div>
						</div>


					</div>
				
				</div>
			</div>

		</div>
		<!--右寄せ-->
		<div class="right-container">
			<div th:replace="side :: sidebar"></div>
		</div>
		<script>
			function openEditModal(postId) {
				document.getElementById('editModal-' + postId).style.display = "block";
			}

			function closeEditModal(postId) {
				document.getElementById('editModal-' + postId).style.display = "none";
			}

			function openDeleteModal(postId) {
				document.getElementById('deleteModal-' + postId).style.display = "block";
			}

			function closeDeleteModal(postId) {
				document.getElementById('deleteModal-' + postId).style.display = "none";
			}
		</script>

</body>

</html>

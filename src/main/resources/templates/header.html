<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ヘッダー</title>
	<link rel="stylesheet" href="/css/header.css">
</head>

<body>
	<header>
		<!--Atlasロゴ-->
		<div class="header-logo">
			<a href="/top"><img src="/images/css-images/atlas.png" class="atlas-logo" alt="アトラスロゴ"></a>
		</div>
		<!--右寄せ-->
		<div class="right">
			<p class="username" th:text="${user.username}+'   さん'"></p>
			<!--アコーディオンメニュー-->
			<div class="accordion">
			    <button class="accordionBtn" type="button">
			        <span class="arrow"></span>
			    </button>
			    <ul class="accordion-content">
			        <li><a href="/top">HOME</a></li>
			        <li><a href="/profile">プロフィール編集</a></li>
			        <li><a href="/logout">ログアウト</a></li>
			    </ul>
			</div>
			<!--アイコン-->
			<div class="header-icon">
				<img th:src="@{/images/icon-images/{icon}(icon=${user.iconPath})}" class="icon" alt="プロフィール画像"
					width="100" height="100">
			</div>
		</div>
	</header>


	<script>
		document.addEventListener("DOMContentLoaded", function () {
		    const btn = document.querySelector(".accordionBtn");
		    const content = document.querySelector(".accordion-content");
		    const arrow = btn.querySelector(".arrow");

		    btn.addEventListener("click", function () {
		        const isOpen = content.style.display === "block";
		        content.style.display = isOpen ? "none" : "block";
		        arrow.classList.toggle("up", !isOpen);
		    });

		    document.addEventListener("click", function (e) {
		        if (!e.target.closest(".accordion")) {
		            content.style.display = "none";
		            arrow.classList.remove("up");
		        }
		    });
		});
	</script>

</body>

</html>
